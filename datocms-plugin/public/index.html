<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Translator</title>
  <script src="https://unpkg.com/datocms-plugins-sdk"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      color: #1a1a2e;
      background: transparent;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #e2e8f0; }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
    }

    .status-info { background: #eff6ff; color: #1e40af; }
    .status-success { background: #f0fdf4; color: #166534; }
    .status-error { background: #fef2f2; color: #991b1b; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .field-count {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 16px 0;
    }

    h3 {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <h3>🌐 AI Tłumaczenie</h3>
    <button class="btn btn-primary" id="translateBtn" onclick="handleTranslate()">
      Przetłumacz na EN + RU
    </button>
    <button class="btn btn-secondary" id="translateOverwriteBtn" onclick="handleTranslate(true)">
      Nadpisz istniejące tłumaczenia
    </button>
    <div class="field-count" id="fieldCount"></div>
    <div id="statusContainer"></div>
  </div>

  <script>
    let plugin = null;

    // Initialize DatoCMS plugin SDK
    DatoCmsPlugin.init((p) => {
      plugin = p;
      plugin.startAutoResizer();
      updateFieldCount();
    });

    function getServerUrl() {
      if (!plugin) return "";
      return (plugin.parameters.global.translationServerUrl || "").replace(/\/$/, "");
    }

    /**
     * Get all localized text fields and their current values from the form
     */
    function getLocalizedFields() {
      if (!plugin) return { fields: {}, fieldPaths: {} };

      const fields = {};
      const fieldPaths = {};
      const sourceLocale = plugin.site.attributes.locales[0]; // pl-PL

      // Iterate through all fields in the current record
      for (const [fieldPath, fieldValue] of Object.entries(plugin.fields)) {
        const field = plugin.fields[fieldPath];
        if (!field || !field.attributes || !field.attributes.localized) continue;

        const fieldType = field.attributes.field_type;
        if (!["string", "text"].includes(fieldType)) continue;

        // Get current value for source locale
        const currentValue = plugin.getFieldValue(fieldPath, sourceLocale);
        if (currentValue && typeof currentValue === "string" && currentValue.trim()) {
          fields[fieldPath] = currentValue;
          fieldPaths[fieldPath] = field;
        }
      }

      return { fields, fieldPaths };
    }

    /**
     * Alternative: get fields directly from form values
     */
    function getFormFields() {
      if (!plugin) return {};

      const sourceLocale = plugin.site.attributes.locales[0];
      const fields = {};

      // Use plugin.itemType to get model fields
      const modelFields = Object.values(plugin.fields);

      for (const field of modelFields) {
        if (!field.attributes.localized) continue;
        const fieldType = field.attributes.field_type;
        if (!["string", "text"].includes(fieldType)) continue;

        const apiKey = field.attributes.api_key;
        const value = plugin.getFieldValue(apiKey, sourceLocale);

        if (value && typeof value === "string" && value.trim()) {
          fields[apiKey] = value;
        }
      }

      return fields;
    }

    function updateFieldCount() {
      const fields = getFormFields();
      const count = Object.keys(fields).length;
      const el = document.getElementById("fieldCount");
      if (count > 0) {
        el.textContent = `${count} pól do przetłumaczenia`;
      } else {
        el.textContent = "Brak pól z polską treścią";
      }
    }

    function setStatus(message, type = "info") {
      const container = document.getElementById("statusContainer");
      container.innerHTML = `<div class="status status-${type}">${message}</div>`;
    }

    function clearStatus() {
      document.getElementById("statusContainer").innerHTML = "";
    }

    function setLoading(loading) {
      const btn = document.getElementById("translateBtn");
      const btn2 = document.getElementById("translateOverwriteBtn");
      if (loading) {
        btn.disabled = true;
        btn2.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Tłumaczenie...';
      } else {
        btn.disabled = false;
        btn2.disabled = false;
        btn.innerHTML = 'Przetłumacz na EN + RU';
      }
    }

    async function handleTranslate(overwrite = false) {
      const serverUrl = getServerUrl();
      if (!serverUrl) {
        setStatus("Skonfiguruj URL serwera w ustawieniach pluginu", "error");
        return;
      }

      const fields = getFormFields();
      if (Object.keys(fields).length === 0) {
        setStatus("Brak pól z polską treścią do przetłumaczenia", "error");
        return;
      }

      const locales = plugin.site.attributes.locales;
      const sourceLocale = locales[0]; // pl-PL
      const targetLocales = locales.slice(1); // [en, ru]
      const modelName = plugin.itemType.attributes.api_key;

      setLoading(true);
      clearStatus();

      try {
        setStatus(`Tłumaczenie ${Object.keys(fields).length} pól...`, "info");

        const response = await fetch(`${serverUrl}/translate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            fields,
            sourceLocale,
            targetLocales,
            modelName,
          }),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `Server error: ${response.status}`);
        }

        const translations = await response.json();

        // Fill in the translated values into the form
        let filledCount = 0;
        for (const locale of targetLocales) {
          if (!translations[locale]) continue;

          for (const [fieldApiKey, translatedValue] of Object.entries(translations[locale])) {
            if (!translatedValue) continue;

            // Check if field already has a value
            const existingValue = plugin.getFieldValue(fieldApiKey, locale);
            if (existingValue && existingValue.trim() && !overwrite) {
              continue; // skip fields that already have translations
            }

            plugin.setFieldValue(fieldApiKey, translatedValue, locale);
            filledCount++;
          }
        }

        setStatus(`✅ Przetłumaczono! Wypełniono ${filledCount} pól. Kliknij "Save" aby zapisać.`, "success");
      } catch (error) {
        console.error("Translation error:", error);
        setStatus(`❌ Błąd: ${error.message}`, "error");
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
